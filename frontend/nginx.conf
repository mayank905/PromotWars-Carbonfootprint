# frontend/nginx.conf  (replace the listen line)
server {
    listen       8080 default_server;   # ← change from $PORT to 8080
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    error_log  /dev/stderr error;
    access_log /dev/stdout  main;
}